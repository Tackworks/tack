name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install fastapi uvicorn httpx

      - name: Smoke test - start server and hit /health
        run: |
          python server.py &
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8795/health)
          echo "Health check returned: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Run tests (if any exist)
        run: |
          if ls test_*.py 1>/dev/null 2>&1; then
            pip install pytest
            pytest -v
          else
            echo "No test files found, skipping"
          fi
